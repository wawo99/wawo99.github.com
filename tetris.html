<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테트리스 완벽 벽충돌 방지 & 그림자 블록</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        flex-direction: column;
      }
      #tetris {
        display: grid;
        grid-template-rows: repeat(20, 30px);
        grid-template-columns: repeat(10, 30px);
        gap: 1px;
        background: #222;
        border: 4px solid #555;
      }
      .cell {
        width: 30px;
        height: 30px;
        background: #111;
        border: 1px solid #222;
        box-sizing: border-box;
      }
      /* 그림자 블록 스타일 (점선 테두리와 어두운 배경) */
      .ghost {
        border: 1px dashed #888;
        background: #2a2a2a;
      }
      /* 활성 블록 및 고정된 블록 스타일 (CSS 순서상 ghost보다 아래에 두어 덮어쓰기) */
      .active {
        border: 1px solid #0aa;
      }
      .filled {
        border: 1px solid #0a0;
      }
      #mobile-controls {
        margin-top: 10px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      button {
        font-size: 18px;
        padding: 10px 15px;
        border-radius: 5px;
        border: none;
        background: #333;
        color: #fff;
        cursor: pointer;
      }
      button:active {
        background: #555;
      }
      #score {
        margin-top: 10px;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div id="tetris"></div>
    <div id="score">점수: 0 | 레벨: 1</div>
    <div id="mobile-controls">
      <button id="left">◀</button>
      <button id="rotate">⟳</button>
      <button id="right">▶</button>
      <button id="down">▼</button>
      <button id="drop">⏬</button>
    </div>

    <script>
      const grid = document.getElementById("tetris");
      const width = 10;
      const height = 20;
      let cells = [];
      let currentPosition = 4;
      let currentRotation = 0;
      let currentShape;
      let timer;
      let score = 0;
      let level = 1;
      let speed = 800;

      // 테트로미노 정의
      const lTetromino = [
        [1, width + 1, width * 2 + 1, 2],
        [width, width + 1, width + 2, width * 2 + 2],
        [1, width + 1, width * 2 + 1, width * 2],
        [width, width * 2, width * 2 + 1, width * 2 + 2],
      ];
      const zTetromino = [
        [0, 1, width + 1, width + 2],
        [2, width + 1, width + 2, width * 2 + 1],
        [0, 1, width + 1, width + 2],
        [2, width + 1, width + 2, width * 2 + 1],
      ];
      const tTetromino = [
        [1, width, width + 1, width + 2],
        [1, width + 1, width + 2, width * 2 + 1],
        [width, width + 1, width + 2, width * 2 + 1],
        [1, width, width + 1, width * 2 + 1],
      ];
      const oTetromino = [
        [0, 1, width, width + 1],
        [0, 1, width, width + 1],
        [0, 1, width, width + 1],
        [0, 1, width, width + 1],
      ];
      const iTetromino = [
        [1, width + 1, width * 2 + 1, width * 3 + 1],
        [width, width + 1, width + 2, width + 3],
        [1, width + 1, width * 2 + 1, width * 3 + 1],
        [width, width + 1, width + 2, width + 3],
      ];

      const tetrominoes = [
        lTetromino,
        zTetromino,
        tTetromino,
        oTetromino,
        iTetromino,
      ];
      const colors = ["#0ff", "#f00", "#a0f", "#ff0", "#0f0"];

      // 그리드 생성
      for (let i = 0; i < width * height; i++) {
        const div = document.createElement("div");
        div.classList.add("cell");
        grid.appendChild(div);
        cells.push(div);
      }

      // 랜덤 블록 선택
      function randomTetromino() {
        const randomIndex = Math.floor(Math.random() * tetrominoes.length);
        currentShape = tetrominoes[randomIndex];
        currentRotation = 0;
        currentPosition = 4;
      }

      // 그림자 블록 위치 계산 함수
      function getGhostPosition() {
        let ghostPos = currentPosition;
        while (isValidPosition(ghostPos + width, currentRotation)) {
          ghostPos += width;
        }
        return ghostPos;
      }

      // 그림자 블록 그리기
      function drawGhost() {
        const ghostPos = getGhostPosition();
        currentShape[currentRotation].forEach((index) => {
          const cell = cells[ghostPos + index];
          if (cell) {
            cell.classList.add("ghost");
          }
        });
      }

      // 그림자 블록 지우기
      function undrawGhost() {
        cells.forEach((cell) => {
          cell.classList.remove("ghost");
        });
      }

      // 블록 그리기 (그림자 포함)
      function draw() {
        drawGhost(); // 활성 블록보다 그림자를 먼저 그립니다.
        currentShape[currentRotation].forEach((index) => {
          const cell = cells[currentPosition + index];
          if (cell) {
            cell.classList.add("active");
            cell.style.backgroundColor =
              colors[tetrominoes.indexOf(currentShape)];
          }
        });
      }

      // 블록 지우기
      function undraw() {
        currentShape[currentRotation].forEach((index) => {
          const cell = cells[currentPosition + index];
          if (cell) {
            cell.classList.remove("active");
            cell.style.backgroundColor = "#111";
          }
        });
        undrawGhost();
      }

      // 완벽한 충돌 검사 (바닥, 채워진 블록, 그리고 1차원 배열의 벽 쪼개짐 방지)
      function isValidPosition(pos, rotation) {
        let minX = width;
        let maxX = -1;

        const isValid = currentShape[rotation].every((index) => {
          const cellIndex = pos + index;
          const x = cellIndex % width;
          const y = Math.floor(cellIndex / width);

          // 1. 보드 밖인지 확인 (아래쪽 경계 및 전체 배열 범위)
          if (y >= height || cellIndex < 0) return false;
          // 2. 다른 블록(filled)과 겹치는지 확인
          if (cells[cellIndex] && cells[cellIndex].classList.contains("filled"))
            return false;

          // X좌표 최솟값, 최댓값 갱신
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;

          return true;
        });

        if (!isValid) return false;

        // 3. 모양이 양쪽 벽을 가로질러 쪼개졌는지 확인 (최대 너비 검사)
        if (maxX - minX > 3) return false;

        return true;
      }

      // 왼쪽 이동 (벽 통과 차단 추가)
      function moveLeft() {
        const isAtLeftEdge = currentShape[currentRotation].some(
          (index) => (currentPosition + index) % width === 0,
        );
        if (
          !isAtLeftEdge &&
          isValidPosition(currentPosition - 1, currentRotation)
        ) {
          undraw();
          currentPosition--;
          draw();
        }
      }

      // 오른쪽 이동 (벽 통과 차단 추가)
      function moveRight() {
        const isAtRightEdge = currentShape[currentRotation].some(
          (index) => (currentPosition + index) % width === width - 1,
        );
        if (
          !isAtRightEdge &&
          isValidPosition(currentPosition + 1, currentRotation)
        ) {
          undraw();
          currentPosition++;
          draw();
        }
      }

      function moveDown() {
        if (isValidPosition(currentPosition + width, currentRotation)) {
          undraw();
          currentPosition += width;
          draw();
        } else {
          freeze();
        }
      }

      // 수직 낙하 (그림자 위치 활용하여 최적화)
      function hardDrop() {
        undraw();
        currentPosition = getGhostPosition(); // 반복문 대신 계산된 그림자 위치로 즉시 이동
        draw();
        freeze();
      }

      // 회전 (벽 근처에서 회전 시 튕겨주기 포함)
      function rotate() {
        const nextRotation = (currentRotation + 1) % currentShape.length;
        const kicks = [0, -1, 1, -2, 2];
        for (let kick of kicks) {
          if (isValidPosition(currentPosition + kick, nextRotation)) {
            undraw();
            currentPosition += kick;
            currentRotation = nextRotation;
            draw();
            return;
          }
        }
      }

      // 블록 고정 및 게임오버/라인제거 처리
      function freeze() {
        currentShape[currentRotation].forEach((index) => {
          const cell = cells[currentPosition + index];
          if (cell) {
            cell.classList.remove("active", "ghost"); // 깔끔한 정리를 위해 상태 제거
            cell.classList.add("filled");
            cell.style.backgroundColor =
              colors[tetrominoes.indexOf(currentShape)];
          }
        });

        clearRows();
        randomTetromino();

        // 새 블록이 나올 자리에 이미 블록이 꽉 차있다면 게임 오버
        if (!isValidPosition(currentPosition, currentRotation)) {
          draw(); // 마지막 블록이 겹친 상태를 보여줌
          setTimeout(() => {
            alert("게임 오버! 점수: " + score);
            document.location.reload();
          }, 50); // 화면이 업데이트될 수 있도록 약간의 딜레이
        } else {
          draw();
        }
      }

      // 라인 제거 및 점수/레벨 업데이트
      function clearRows() {
        for (let i = 0; i < height; i++) {
          const row = [];
          for (let j = 0; j < width; j++) row.push(cells[i * width + j]);

          if (row.every((cell) => cell.classList.contains("filled"))) {
            row.forEach((cell) => {
              cell.classList.remove("filled", "active", "ghost");
              cell.style.backgroundColor = "#111";
            });
            const removed = cells.splice(i * width, width);
            cells = removed.concat(cells);
            cells.forEach((cell) => grid.appendChild(cell)); // DOM에 다시 붙여서 위로 올림
            score += 10;
            updateScoreLevel();
          }
        }
      }

      function updateScoreLevel() {
        document.getElementById("score").innerText =
          `점수: ${score} | 레벨: ${level}`;
        if (score > 0 && score % 50 === 0) {
          level++;
          speed = Math.max(100, speed - 100);
          clearInterval(timer);
          timer = setInterval(moveDown, speed);
        }
      }

      // 이벤트 리스너 설정
      document.getElementById("left").addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveLeft();
      });
      document.getElementById("right").addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveRight();
      });
      document.getElementById("down").addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveDown();
      });
      document.getElementById("rotate").addEventListener("touchstart", (e) => {
        e.preventDefault();
        rotate();
      });
      document.getElementById("drop").addEventListener("touchstart", (e) => {
        e.preventDefault();
        hardDrop();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") moveLeft();
        if (e.key === "ArrowRight") moveRight();
        if (e.key === "ArrowDown") moveDown();
        if (e.key === "ArrowUp") rotate();
        if (e.key === " ") hardDrop();
      });

      // 게임 시작
      randomTetromino();
      draw();
      timer = setInterval(moveDown, speed);
    </script>
  </body>
</html>
